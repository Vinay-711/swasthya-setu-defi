# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  review_status: true
  collapse_walkthrough: false
  poem: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
  path_instructions:
    - path: "frontend/**"
      instructions: "Review for accessibility, responsive design, and performance. Ensure proper semantic HTML. Check for XSS vulnerabilities in innerHTML usage."
    - path: "backend/**"
      instructions: "Review for security best practices, proper error handling, input validation, and adherence to FastAPI patterns. Check for proper use of Pydantic models."
    - path: "**/*.py"
      instructions: "Follow PEP 8 standards. Verify type hints are present and correct."

chat:
  auto_reply: true
