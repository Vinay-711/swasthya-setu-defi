version: "3.8"

# ═══════════════════════════════════════════════
#  SwasthyaSetu — Full-Stack Docker Compose
# ═══════════════════════════════════════════════

services:
  # ─── Infrastructure ───────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swasthya
      POSTGRES_PASSWORD: swasthya
      POSTGRES_DB: swasthyasetu
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swasthya"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ─── API Gateway ──────────────────────────────

  kong:
    image: kong:3.5
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    depends_on:
      identity-service:
        condition: service_healthy
      health-service:
        condition: service_healthy
      ai-ml-service:
        condition: service_healthy
      translation-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  # ─── Node.js Microservices ────────────────────

  identity-service:
    build: ../backend/services/identity-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/swasthyasetu
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  health-service:
    build: ../backend/services/health-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb:27017/swasthyasetu
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  notification-service:
    build: ../backend/services/notification-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── Python Microservices ─────────────────────

  ai-ml-service:
    build: ../backend/services/ai-ml-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  translation-service:
    build: ../backend/services/translation-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  document-service:
    build: ../backend/services/document-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: swasthyasetu-documents
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  pg_data:
  mongo_data:
  redis_data:
  minio_data:
