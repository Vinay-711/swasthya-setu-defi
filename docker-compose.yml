services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: swasthya-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-swasthya}:${POSTGRES_PASSWORD:-swasthya}@postgres:5432/${POSTGRES_DB:-swasthyasetu}
      MONGODB_URL: mongodb://mongodb:27017/${MONGO_DB:-swasthyasetu}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret}
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
      STORAGE_DIR: /app/backend/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swasthya-net

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: swasthya-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - swasthya-net

  postgres:
    image: postgres:16-alpine
    container_name: swasthya-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swasthyasetu}
      POSTGRES_USER: ${POSTGRES_USER:-swasthya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swasthya}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swasthya} -d ${POSTGRES_DB:-swasthyasetu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swasthya-net

  mongodb:
    image: mongo:7
    container_name: swasthya-mongodb
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-swasthyasetu}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swasthya-net

  redis:
    image: redis:7-alpine
    container_name: swasthya-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swasthya-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: swasthya-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@swasthya.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swasthya-net

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  pgadmin_data:

networks:
  swasthya-net:
    name: swasthya-net
    driver: bridge
